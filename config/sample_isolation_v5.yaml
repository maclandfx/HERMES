# 评估体系样本隔离方案 — v5.1 权重回归设计
# 来源: 华泰金工《自进化Skill》2026-05-25 沈洋/何康
# 创建日期: 2026-07-07
# 创建人: Hermes Agent

# ── 核心原则 ─────────────────────────────────────
# 训练集: 生成策略假设 (可尝试多种权重组合)
# 验证集: 筛选最优版本 (保留改善的配置)
# 测试集: 最终复核 (不进自动调参闭环)

# ── 样本划分 ─────────────────────────────────────
sample_split:
  # 训练集 — 用于探索权重配置空间
  train:
    start: "2024-01-01"
    end:   "2025-12-31"
    note:  "全量历史，允许自由尝试 v5.1/v5.2 权重组合"

  # 验证集 — 用于筛选有效版本
  validate:
    start: "2026-01-01"
    end:   "2026-05-31"
    note:  "固定内核限制，每次只调一个维度权重"

  # 测试集 — 仅最终人工复核
  test:
    start: "2026-06-01"
    end:   "2026-07-07"
    note:  "不进自动调参闭环，仅输出最终绩效"

# ── 评价体系 ─────────────────────────────────────
# 验证集通过的版本才进入测试集评估
# 通过条件: 夏普比率 ≥ 验证集初始值 + 5% 提升
pass_criteria:
  min_sharpe_improvement: 0.05
  min_win_rate: 0.45       # 胜率 ≥45%
  max_drawdown: 0.30       # 最大回撤 ≤30%

# ── 迭代纪律 ─────────────────────────────────────
# 每次只改一个维度权重，修改幅度 ±0.05
# 不改: 评分函数逻辑、象限判定阈值、涨跌停处理
iteration_rules:
  max_delta_per_iter: 0.05    # 单次调整最大步长
  one_dimension_only: true     # 每次只调一个维度
  no_code_change: true         # 不改评分函数/阈值
  rollback_on_fail: true       # 验证集未改善则回滚

# ── 版本标记规范 ─────────────────────────────────
# v5.0.1 — 微调 policy 权重
# v5.0.2 — 微调 national_team 权重
# v5.0.x — 仅权重调整
# v5.1   — 新增功能/维度
versioning:
  patch: "v5.0.x"   # 仅权重微调
  minor: "v5.1"     # 新增功能/维度
  major: "v6.0"     # 架构级变更
