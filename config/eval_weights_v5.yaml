# 评估体系 v5.0 权重配置文件
# 用途: 将权重从代码中独立出来，便于版本管理和多方案对比
# 修改日期: 2026-07-07
# 修改人: Hermes Agent (自动版本化管理)

---
version: "5.0"
created_at: "2026-07-07"
description: "A股实战驱动版 — 政策催化30% + 国家队面10% + 技术面25% + 资金面20%"

# ── 维度权重 ──────────────────────────────────────
dimensions:
  policy:        0.27   # 政策催化 (新增) — 调整后使总和=1.0
  national_team: 0.09   # 国家队面 (新增)
  tech:          0.23   # 技术面
  capital:       0.18   # 资金面
  fundamental:   0.09   # 基本面
  sector:        0.06   # 板块面
  heat:          0.04   # 热度面
  zscore:        0.04   # ZSCORE比价

# 权重校验: 总和应 = 1.0 (0.27+0.09+0.23+0.18+0.09+0.06+0.04+0.04 = 1.00)
weights_sum: 1.00

# ── 涨跌停阈值 ─────────────────────────────────────
limits:
  limit_up:      9.9    # 涨停判定阈值 (%)
  limit_down:   -9.9    # 跌停判定阈值 (%)

# ── 象限判定阈值 ────────────────────────────────────
quadrant_thresholds:
  bias_threshold:   0.15   # SBI 偏见阈值
  trend_threshold:  0.15   # 价格趋势阈值

# ── 政策关键词权重 ──────────────────────────────────
policy_keywords:
  # 一级政策（部委专项规划/五年规划）
  "规划":      10
  "十五五":    15
  "专项规划":  10
  # 二级政策（部委意见/办法/通知）
  "意见":      8
  "办法":      8
  "通知":      6
  # 三级政策（部委调研/会议）
  "调研":      4
  "会议":      4
  "座谈会":    3
  # 产业关键词（高优先级）
  "低空经济":  12
  "商业航天":  12
  "新型电力":  12
  "储能":      10
  "固态电池":  10
  "人工智能":  10
  "算力":      10
  "芯片":      10
  "半导体":    10
  "光刻机":    10
  "EDA":       10
  "HBM":       10
  "卫星互联网": 10
  "超算":      10
  # 国家队关键词
  "大基金":    15
  "汇金":      12
  "证金":      12
  "诚通":      10
  "国新":      10
  "社保基金":  10
  "养老金":    10
  "央企":      8
  "中特估":    8

# ── 回测参数 ────────────────────────────────────────
backtest:
  hold_days: [2, 5, 10, 20]
  default_lookback: 20
  sample_split:
    train:    "2024-01-01 ~ 2025-12-31"
    validate: "2026-01-01 ~ 2026-05-31"
    test:     "2026-06-01 ~ 2026-07-07"
    split_note: "训练集→生成假设; 验证集→筛选版本; 测试集→最终复核"
